<div class="space-y-8">
  <!-- Header -->
  <div class="flex justify-between items-end border-b border-white/5 pb-6">
    <div>
      <h3 class="text-3xl font-black text-white tracking-tight">Clinical Queue</h3>
      <p class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.2em] italic">✦ Daily Consultation Triage</p>
    </div>
    <span *ngIf="error" class="text-red-400 text-[10px] font-black uppercase">{{ error }}</span>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex flex-col items-center justify-center py-20">
    <div class="w-10 h-10 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Loading Patient Queue...</p>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && appointments.length === 0"
       class="py-20 text-center bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
    <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">No scheduled patients</p>
  </div>

  <!-- Appointments -->
  <div *ngIf="!loading" class="grid grid-cols-1 gap-4">
    <div *ngFor="let appt of appointments"
         [class]="'relative overflow-hidden transition-all duration-500 rounded-[2rem] border ' + (expandedId === appt._id ? 'bg-indigo-500/10 border-indigo-500/40' : 'bg-white/5 border-white/10 hover:border-white/20')">

      <div class="p-6 md:p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
        <!-- Patient Info -->
        <div class="flex items-center gap-6">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center text-white shadow-lg">
            <span class="font-black text-xl">{{ getInitial(appt.patientId?.userId?.name) }}</span>
          </div>
          <div>
            <h4 class="text-white font-black text-xl leading-tight">{{ appt.patientId?.userId?.name }}</h4>
            <div class="flex gap-3 items-center mt-1">
              <span class="text-indigo-400 text-[10px] font-black uppercase tracking-widest">{{ formatDate(appt.appointmentDate) }}</span>
              <span [class]="'text-[10px] font-black uppercase px-2 py-0.5 rounded-md ' + (appt.status === 'completed' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-orange-500/20 text-orange-400')">
                {{ appt.status }}
              </span>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-3 w-full md:w-auto">
          <button (click)="toggleExpand(appt._id)"
                  class="flex-1 md:flex-none px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-white text-[10px] font-black uppercase tracking-widest border border-white/10 transition-all">
            {{ expandedId === appt._id ? 'Close Record' : 'Medical Record' }}
          </button>
          <button *ngIf="appt.status !== 'completed'"
                  (click)="markCompleted(appt._id)"
                  class="flex-1 md:flex-none px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-black uppercase tracking-widest shadow-lg transition-all">
            Finalize
          </button>
        </div>
      </div>

      <!-- Expandable Medical Record -->
      <div *ngIf="expandedId === appt._id"
           class="border-t border-white/5 bg-slate-900/40">
        <div class="p-8">
          <app-add-medical-record [appointmentId]="appt._id"></app-add-medical-record>
        </div>
      </div>
    </div>
  </div>
</div>
