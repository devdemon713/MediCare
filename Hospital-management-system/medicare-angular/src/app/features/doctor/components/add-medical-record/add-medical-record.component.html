<div class="w-full max-w-lg mx-auto">
  <div class="p-8 rounded-[2.5rem] bg-slate-900/40 border border-white/10 backdrop-blur-2xl shadow-2xl">
    <div class="flex items-center gap-4 mb-8">
      <div class="p-3 rounded-2xl bg-teal-500/10 text-teal-400">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div>
        <h4 class="text-xl font-black text-white tracking-tight">Clinical Record</h4>
        <p class="text-teal-500 text-[10px] font-black uppercase tracking-widest italic opacity-80">✦ Session Documentation</p>
      </div>
    </div>

    <form (ngSubmit)="handleSubmit()" class="space-y-4">
      <input placeholder="Primary Diagnosis" [class]="inputStyles"
             [(ngModel)]="diagnosis" name="diagnosis" required />
      <input placeholder="Prescription / Medication" [class]="inputStyles"
             [(ngModel)]="prescription" name="prescription" required />
      <textarea placeholder="Clinical Notes & Observations" rows="4"
                [class]="inputStyles + ' resize-none'"
                [(ngModel)]="notes" name="notes"></textarea>
      <button type="submit"
              class="w-full bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-black py-4 rounded-2xl transition-all duration-300 uppercase tracking-widest shadow-lg mt-2">
        Commit to Ledger
      </button>
    </form>

    <div *ngIf="message"
         [class]="'mt-6 p-4 rounded-2xl text-[10px] text-center font-black uppercase tracking-widest border ' + (status === 'success' ? 'bg-teal-500/10 border-teal-500/20 text-teal-400' : 'bg-red-500/10 border-red-500/20 text-red-400')">
      {{ message }}
    </div>
  </div>
</div>
