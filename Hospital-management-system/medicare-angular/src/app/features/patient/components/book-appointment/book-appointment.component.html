<div class="relative min-h-[60vh] flex items-center justify-center py-10 px-4">
  <div class="w-full max-w-md p-8 md:p-10 rounded-[2.5rem] bg-white/5 border border-white/10 backdrop-blur-2xl shadow-2xl">

    <div class="text-center mb-10">
      <div class="inline-block p-4 rounded-2xl bg-cyan-500/10 text-cyan-400 mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <h2 class="text-3xl font-black text-white tracking-tight">Schedule Visit</h2>
      <p class="text-slate-400 mt-2 text-[10px] font-black uppercase tracking-[0.2em] italic opacity-60">✦ BetterLife Appointment Protocol</p>
    </div>

    <form (ngSubmit)="handleSubmit()" class="space-y-6">
      <!-- Doctor Select -->
      <div class="relative">
        <select [(ngModel)]="doctorId" name="doctorId" [class]="inputStyles" required>
          <option value="" class="bg-slate-900 text-slate-500">Select Specialist</option>
          <option *ngFor="let doc of doctors" [value]="doc._id" class="bg-slate-900 text-white">
            Dr. {{ doc.userId?.name }} — {{ doc.specialization }}
          </option>
        </select>
        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Date -->
      <input type="date" [(ngModel)]="date" name="date" [class]="inputStyles" required />

      <button type="submit"
              class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-black py-4 rounded-2xl transition-all duration-300 uppercase tracking-widest shadow-lg">
        Confirm Slot
      </button>
    </form>

    <div *ngIf="message"
         [class]="'mt-8 p-4 rounded-2xl text-[10px] text-center font-black uppercase tracking-widest border ' + (status === 'success' ? 'bg-cyan-500/10 border-cyan-500/20 text-cyan-400' : 'bg-red-500/10 border-red-500/20 text-red-400')">
      {{ message }}
    </div>
  </div>
</div>
