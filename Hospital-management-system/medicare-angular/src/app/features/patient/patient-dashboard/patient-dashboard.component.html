<app-dashboard-layout title="Health Portal">
  <div class="space-y-10">

    <!-- Welcome Header -->
    <div class="relative p-10 rounded-[3rem] bg-gradient-to-br from-emerald-600 to-teal-700 shadow-2xl overflow-hidden">
      <div class="relative z-10 max-w-2xl">
        <h2 class="text-4xl font-black text-white tracking-tight italic">Hello, Patient</h2>
        <p class="text-emerald-50 text-sm mt-3 font-medium opacity-90 leading-relaxed">
          Welcome to your BetterLife command center. From here, you can manage your consultations,
          access prescriptions, and track your wellness journey in real-time.
        </p>
      </div>
      <div class="absolute right-[-5%] top-[-20%] opacity-20 pointer-events-none">
        <svg width="300" height="300" viewBox="0 0 200 200" fill="none">
          <path d="M40 100 Q 60 40, 100 100 T 160 100" stroke="white" stroke-width="2" fill="none"/>
          <circle cx="100" cy="100" r="80" stroke="white" stroke-width="1" stroke-dasharray="4 4"/>
        </svg>
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex flex-wrap items-center gap-3 p-2 bg-white/5 border border-white/10 rounded-[2.5rem] w-fit backdrop-blur-xl mx-auto md:mx-0">
      <button *ngFor="let item of navItems"
              (click)="view = item.id"
              [class]="'relative px-8 py-4 rounded-[2rem] text-[10px] font-black uppercase tracking-widest transition-all duration-500 ' + (view === item.id ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:text-emerald-400')">
        <span class="flex items-center gap-3">
          <span class="text-base">{{ item.icon }}</span>
          {{ item.label }}
        </span>
      </button>
    </div>

    <!-- Content -->
    <div class="min-h-[500px]">
      <div class="bg-white/[0.02] border border-white/5 rounded-[3rem] p-4 md:p-8 backdrop-blur-sm">
        <app-book-appointment   *ngIf="view === 'book'"></app-book-appointment>
        <app-my-appointments    *ngIf="view === 'appointments'"></app-my-appointments>
        <app-my-medical-records *ngIf="view === 'records'"></app-my-medical-records>
      </div>
    </div>

  </div>
</app-dashboard-layout>
