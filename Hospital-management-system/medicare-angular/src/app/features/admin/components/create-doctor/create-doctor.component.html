<div class="relative min-h-[80vh] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-lg p-8 md:p-10 rounded-[2.5rem] bg-white/5 border border-white/10 backdrop-blur-xl shadow-2xl">

    <div class="text-center mb-8">
      <div class="inline-block p-3 rounded-2xl bg-blue-500/10 text-blue-400 mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <h2 class="text-3xl font-black text-white tracking-tight">Onboard Doctor</h2>
      <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest font-bold italic opacity-70">✦ Administrative Access</p>
    </div>

    <form (ngSubmit)="handleSubmit()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" placeholder="Doctor Name" [class]="inputStyles"
               [(ngModel)]="name" name="name" required />
        <input type="email" placeholder="Email Address" [class]="inputStyles"
               [(ngModel)]="email" name="email" required />
      </div>
      <input type="password" placeholder="System Password" [class]="inputStyles"
             [(ngModel)]="password" name="password" required />
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" placeholder="Specialization" [class]="inputStyles"
               [(ngModel)]="specialization" name="specialization" required />
        <input type="number" placeholder="Consultation Fee (₹)" [class]="inputStyles"
               [(ngModel)]="consultationFee" name="consultationFee" required />
      </div>
      <button type="submit"
              class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-emerald-500 text-white font-black py-4 rounded-2xl transition-all duration-300 uppercase tracking-widest shadow-lg">
        Create Staff Profile
      </button>
    </form>

    <div *ngIf="message"
         [class]="'mt-6 p-4 rounded-2xl text-sm text-center font-bold border ' + (status === 'success' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-red-500/10 border-red-500/20 text-red-400')">
      {{ message }}
    </div>
  </div>
</div>
