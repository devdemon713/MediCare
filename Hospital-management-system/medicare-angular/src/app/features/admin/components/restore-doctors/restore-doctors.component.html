<div class="space-y-8">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-2">
    <div>
      <h3 class="text-3xl font-black text-white tracking-tight">Staff Recovery</h3>
      <p class="text-purple-400 text-[10px] font-black uppercase tracking-[0.2em] italic">✦ Inactive Medical Professionals</p>
    </div>
    <span *ngIf="error" class="text-red-400 text-[10px] font-bold uppercase">{{ error }}</span>
  </div>

  <div *ngIf="loading" class="flex flex-col items-center justify-center py-20">
    <div class="w-10 h-10 border-2 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest">Scanning Archives...</p>
  </div>

  <div *ngIf="!loading && doctors.length === 0"
       class="text-center py-24 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
    <p class="text-slate-600 font-bold uppercase tracking-widest text-xs">No doctor profiles currently archived</p>
  </div>

  <div *ngIf="!loading && doctors.length > 0"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let d of doctors"
         class="relative group bg-white/5 border border-white/10 p-6 rounded-[2rem] overflow-hidden backdrop-blur-md hover:border-purple-500/40 transition-all">
      <div class="flex justify-between items-start mb-6">
        <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
          </svg>
        </div>
        <span class="text-[10px] font-mono text-slate-600 bg-white/5 px-2 py-1 rounded">
          DOC_{{ d._id?.slice(-4)?.toUpperCase() }}
        </span>
      </div>
      <h4 class="text-white font-black text-xl mb-1 truncate">{{ d.userId?.name }}</h4>
      <p class="text-blue-400 text-[10px] font-black uppercase tracking-widest mb-6">{{ d.specialization }}</p>
      <button (click)="restore(d.userId._id)"
              class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-[10px] font-black uppercase tracking-[0.2em] shadow-lg transition-all">
        Restore Access
      </button>
    </div>
  </div>
</div>
