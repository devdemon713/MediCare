<div class="space-y-8">
  <!-- Control Bar -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div>
      <h3 class="text-3xl font-black text-white tracking-tight">Patient Directory</h3>
      <p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.2em] italic">✦ Active Records Database</p>
    </div>
    <div class="flex w-full md:w-auto gap-3">
      <input type="text" placeholder="Filter by name..."
             [(ngModel)]="search" (ngModelChange)="onSearch()"
             class="flex-grow md:w-64 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50" />
      <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
        <button *ngFor="let v of ['table','cards']"
                (click)="viewMode = v"
                [class]="'px-4 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all ' + (viewMode === v ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300')">
          {{ v }}
        </button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex flex-col items-center justify-center py-20">
    <div class="w-12 h-12 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
    <p class="text-slate-500 text-xs font-black tracking-widest uppercase italic">Fetching Records...</p>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && filteredPatients.length === 0"
       class="text-center py-20 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
    <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">No Patients Found</p>
  </div>

  <!-- Table -->
  <div *ngIf="!loading && filteredPatients.length > 0 && viewMode === 'table'"
       class="overflow-x-auto rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl">
    <table class="w-full text-left border-collapse">
      <thead class="bg-white/5 border-b border-white/10">
        <tr>
          <th class="px-6 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Name</th>
          <th class="px-6 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Age</th>
          <th class="px-6 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Gender</th>
          <th class="px-6 py-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-white/5">
        <tr *ngFor="let p of filteredPatients" class="hover:bg-emerald-500/5 transition-colors group">
          <td class="px-6 py-4">
            <div class="text-white font-bold">{{ p.userId?.name }}</div>
            <div class="text-[10px] text-slate-500 font-mono">ID: {{ p._id?.slice(-6) }}</div>
          </td>
          <td class="px-6 py-4 text-slate-300">{{ p.age }}</td>
          <td class="px-6 py-4">
            <span class="px-2 py-1 rounded-md bg-white/10 text-slate-400 text-[10px] font-black uppercase">{{ p.gender }}</span>
          </td>
          <td class="px-6 py-4 text-right">
            <button (click)="deactivate(p._id)"
                    class="text-red-500 text-[10px] font-black uppercase opacity-40 group-hover:opacity-100 hover:text-red-400 transition-all">
              Deactivate
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Cards -->
  <div *ngIf="!loading && filteredPatients.length > 0 && viewMode === 'cards'"
       class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let p of filteredPatients"
         class="bg-white/5 border border-white/10 p-6 rounded-[2rem] hover:border-emerald-500/40 transition-all group backdrop-blur-md">
      <h4 class="text-white font-black text-xl mb-1">{{ p.userId?.name }}</h4>
      <div class="flex gap-3 mb-6">
        <span class="text-emerald-400 text-[10px] font-black uppercase tracking-widest">{{ p.gender }}</span>
        <span class="text-slate-500 text-[10px] font-black uppercase tracking-widest">{{ p.age }} Years</span>
      </div>
      <button (click)="deactivate(p._id)"
              class="w-full py-3 rounded-xl bg-red-500/10 text-red-500 text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-all duration-300">
        Deactivate
      </button>
    </div>
  </div>
</div>
